<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FlowForge email capture panel">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06121e"/>
      <stop offset="100%" stop-color="#10304a"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#20cbf6"/>
      <stop offset="100%" stop-color="#6ef0ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <g transform="translate(170 120)">
    <rect width="860" height="460" rx="28" fill="#0e2b43" stroke="#35c3e6" stroke-width="2"/>
    <text x="56" y="92" font-size="44" font-weight="700" fill="#e1fbff" font-family="Segoe UI, Arial, sans-serif">Save Your Demo Progress</text>
    <text x="56" y="136" font-size="24" fill="#a4ddec" font-family="Segoe UI, Arial, sans-serif">Enter your email to continue where you left off.</text>

    <rect x="56" y="190" width="748" height="72" rx="14" fill="#143e5d" stroke="#46d4f3"/>
    <text x="84" y="236" font-size="24" fill="#86c6d8" font-family="Segoe UI, Arial, sans-serif">name@company.com</text>

    <rect x="56" y="292" width="320" height="72" rx="14" fill="url(#btn)"/>
    <text x="118" y="338" font-size="28" font-weight="700" fill="#053047" font-family="Segoe UI, Arial, sans-serif">Continue Demo</text>

    <rect x="398" y="292" width="220" height="72" rx="14" fill="#143e5d" stroke="#46d4f3"/>
    <text x="456" y="338" font-size="28" font-weight="700" fill="#bdefff" font-family="Segoe UI, Arial, sans-serif">Skip</text>

    <rect x="56" y="398" width="28" height="28" rx="6" fill="#143e5d" stroke="#46d4f3"/>
    <polyline points="62,412 69,419 79,406" fill="none" stroke="#6ef0ff" stroke-width="4"/>
    <text x="98" y="420" font-size="20" fill="#a4ddec" font-family="Segoe UI, Arial, sans-serif">Send product updates and workflow tips</text>
  </g>
</svg>

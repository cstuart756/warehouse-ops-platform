<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Before and after warehouse operations with guided workflows">
  <defs>
    <linearGradient id="bgLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5f3d2e"/>
      <stop offset="100%" stop-color="#2a2320"/>
    </linearGradient>
    <linearGradient id="bgRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b2b46"/>
      <stop offset="100%" stop-color="#0a1728"/>
    </linearGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#44d9ff"/>
      <stop offset="100%" stop-color="#7af0ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="800" height="900" fill="url(#bgLeft)"/>
  <rect x="800" y="0" width="800" height="900" fill="url(#bgRight)"/>
  <rect x="797" y="0" width="6" height="900" fill="url(#divider)"/>

  <g opacity="0.55">
    <rect x="120" y="180" width="180" height="560" rx="6" fill="#6b4d3a"/>
    <rect x="340" y="120" width="210" height="620" rx="6" fill="#7b5640"/>
    <rect x="590" y="210" width="130" height="530" rx="6" fill="#5e4838"/>
  </g>

  <g opacity="0.7">
    <rect x="910" y="140" width="180" height="600" rx="8" fill="#123e66"/>
    <rect x="1120" y="100" width="210" height="640" rx="8" fill="#155180"/>
    <rect x="1360" y="180" width="130" height="560" rx="8" fill="#0f3559"/>
  </g>

  <g transform="translate(510 540)" filter="url(#shadow)">
    <circle cx="0" cy="-180" r="46" fill="#d7b39a"/>
    <rect x="-58" y="-130" width="116" height="180" rx="22" fill="#3f3a37"/>
    <rect x="-92" y="-72" width="58" height="22" rx="11" fill="#d7b39a" transform="rotate(18)"/>
    <rect x="14" y="-72" width="58" height="22" rx="11" fill="#d7b39a" transform="rotate(-24)"/>
    <rect x="-44" y="-36" width="88" height="124" rx="10" fill="#e8ddcf"/>
    <line x1="-30" y1="-10" x2="30" y2="-10" stroke="#997f67" stroke-width="5"/>
    <line x1="-30" y1="12" x2="30" y2="12" stroke="#997f67" stroke-width="5"/>
  </g>

  <g transform="translate(1105 520)" filter="url(#shadow)">
    <circle cx="0" cy="-180" r="46" fill="#f0d2bd"/>
    <rect x="-58" y="-130" width="116" height="180" rx="22" fill="#13415d"/>
    <rect x="-84" y="-74" width="54" height="22" rx="11" fill="#f0d2bd" transform="rotate(10)"/>
    <rect x="24" y="-74" width="74" height="116" rx="12" fill="#0f1d2d"/>
    <rect x="30" y="-66" width="62" height="96" rx="10" fill="#0d2f49"/>
    <rect x="36" y="-58" width="50" height="14" rx="7" fill="#27d0ff"/>
    <rect x="36" y="-36" width="50" height="10" rx="5" fill="#8cecff" opacity="0.9"/>
    <rect x="36" y="-20" width="36" height="8" rx="4" fill="#8cecff" opacity="0.8"/>
  </g>

  <g transform="translate(920 300)" filter="url(#shadow)">
    <rect x="0" y="0" width="420" height="230" rx="18" fill="#0b2035" stroke="#1db6e8" stroke-width="2"/>
    <rect x="24" y="26" width="170" height="18" rx="9" fill="#6ce7ff"/>
    <rect x="24" y="64" width="372" height="10" rx="5" fill="#194b6f"/>
    <rect x="24" y="64" width="238" height="10" rx="5" fill="#29d8ff"/>
    <rect x="24" y="96" width="250" height="12" rx="6" fill="#8cecff" opacity="0.85"/>
    <rect x="24" y="118" width="210" height="12" rx="6" fill="#8cecff" opacity="0.75"/>
    <rect x="24" y="162" width="172" height="42" rx="12" fill="#1dc5f7"/>
    <rect x="212" y="162" width="184" height="42" rx="12" fill="#113149" stroke="#38dfff"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="1.5">
    <text x="70" y="80" font-size="52" fill="#ffd9b7">BEFORE</text>
    <text x="870" y="80" font-size="52" fill="#8cecff">AFTER</text>
  </g>
</svg>
